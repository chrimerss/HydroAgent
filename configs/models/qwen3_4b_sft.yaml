# Qwen3-8B SFT configuration — distillation from GPT-4o
# Output model: chrimerss/Qwen-3-8B-hydro-distill
name: "qwen3-4b-sft"
model_id: "Qwen/Qwen3-4B-Instruct-2507"
hf_repo_id: "chrimerss/Qwen-3-4B-hydro-distill"

# LoRA configuration (same architecture as RL for compatibility)
lora_r: 8
lora_alpha: 16
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# Training
grad_accum_steps: 8
num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2.0e-6
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_seq_length: 4096
bf16: true