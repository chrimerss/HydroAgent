# HydroLLM GRPO training overlay for verl.
# Composed via `--config-path configs/verl --config-name qwen3_4b_grpo`
# in modal_app/train.py. Pulls verl's ppo_trainer defaults and overrides
# only what we need.

hydra:
  searchpath:
    - file:///opt/verl/verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

# Layered on top of verl's ppo_trainer defaults; we only override.

algorithm:
  adv_estimator: grpo
  use_kl_in_reward: false
  kl_penalty: kl
  kl_ctrl:
    type: fixed
    kl_coef: 0.0

data:
  train_files:
    - /workspace/data/verl/train.parquet
  val_files:
    - /workspace/data/verl/val.parquet
  train_batch_size: 4
  val_batch_size: 4
  max_prompt_length: 2048
  max_response_length: 4096
  filter_overlong_prompts: true
  truncation: error
  shuffle: true
  return_raw_chat: true

actor_rollout_ref:
  model:
    # Reverted to raw Instruct: SFT on 73 trajectories collapsed the policy
    # to a deterministic GPT-5-style output (entropy ≈ 0.04, all K=6
    # rollouts within 150 tokens of each other → zero GRPO advantage). The
    # raw Instruct model scored NSE=0.60 in baseline eval and has a healthy
    # multi-modal distribution — better starting point. The A+B+C
    # anti-collapse settings (high KL, light entropy, temp=1.0) are what
    # actually prevent catastrophic forgetting.
    path: Qwen/Qwen3-4B-Instruct-2507
    enable_gradient_checkpointing: true
    use_remove_padding: true
    trust_remote_code: true
  actor:
    optim:
      lr: 1.0e-6
      weight_decay: 0.0
      lr_warmup_steps_ratio: 0.05
    ppo_mini_batch_size: 4
    ppo_micro_batch_size_per_gpu: 1
    use_kl_loss: true
    kl_loss_coef: 0.05     # (A) The anchor that produced the working
                           # step_50 (NSE=0.544 on 02338660). Sticking to
                           # this since it is the configuration that
                           # actually trained productively for 50 steps.
    kl_loss_type: low_var_kl
    entropy_coeff: 0.01    # (B) Light exploration only — SFT distribution
                           # is already good and multi-modal, so we don't
                           # need 0.05 entropy bonus pushing it toward
                           # uniform.
    grad_clip: 1.0
    fsdp_config:
      param_offload: false
      optimizer_offload: false
    log_prob_micro_batch_size_per_gpu: 1
  rollout:
    name: sglang             # multi-turn tool dispatch is native in sglang;
                             # vllm parses tool_call blocks but never invokes
                             # registered tool classes in verl 0.5.
    mode: sync
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.45    # 0.55 caused OOM during ref-module init.
                                    # Actor+ref+optim need ~12GB/GPU after
                                    # FSDP sharding, plus activations; leave
                                    # SGLang less so init has headroom.
    n: 6                       # K rollouts per prompt (GRPO group size).
                               # 8 → 6 gives ~25% wall-time reduction with
                               # only mild variance loss; below 4 hurts
                               # GRPO advantage estimation.
    temperature: 1.0           # (C) Standard sampling; 1.2 destabilized
                               # post-update distribution.
    top_p: 0.95
    max_num_batched_tokens: 8192
    free_cache_engine: true
    log_prob_micro_batch_size_per_gpu: 1
    multi_turn:
      enable: true
      max_assistant_turns: 50
      tool_config_path: /workspace/configs/verl/tool_config.yaml
      format: hermes
      use_inference_chat_template: true
  ref:
    log_prob_micro_batch_size_per_gpu: 1
    fsdp_config:
      param_offload: true

custom_reward_function:
  path: /workspace/src/hydrollm/verl_reward.py
  name: compute_score

trainer:
  project_name: hydrollm
  experiment_name: qwen3-4b-grpo
  logger: [console, wandb]
  n_gpus_per_node: 4
  nnodes: 1
  save_freq: 10        # Each step ~30min wall time; checkpoint every 10
                       # steps (~5h) so resume can recover from the 24h
                       # Modal function timeout without losing >5h of work.
  test_freq: 25
  total_epochs: 30
  # New dir (was qwen3-4b-grpo) so resume_mode=auto doesn't pull the
  # stale checkpoint from the pre-SFT failed run that's still on the volume.
  # Resume from the anchored run's step_50 (best A+B+C checkpoint so far).
  # With resume_mode: auto verl reads latest_checkpointed_iteration.txt and
  # picks up at step 51 with the new iter-bonus reward + kl=0.2.
  default_local_dir: /checkpoints/qwen3-4b-grpo-anchored
  resume_mode: auto
